# Meshtastic BBS Server Configuration
# Copy this file to config.yaml and modify as needed

# BBS Node Settings
bbs:
  # Node ID - leave empty to auto-detect from connected radios
  # If empty, the BBS will use the node ID from each connected radio
  node_id: ""
  
  # Human-readable name for this BBS
  name: "MeshBBS"
  
  # Description shown in HELP command
  description: "Meshtastic Bulletin Board System"

# Serial Device Configuration
# Leave devices empty to auto-detect Meshtastic devices
# Or specify explicit ports:
serial:
  devices: []

# Database Settings
database:
  # Path to SQLite database file (use local path or change to /var/lib/meshtastic-bbs/bbs.db for system-wide)
  path: "bbs.db"

# Logging Configuration
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  
  # Log file path (optional, leave empty for stdout only, or use absolute path)
  file: "bbs.log"
  
  # Log format
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Plugin Configuration
plugins:
  # List of plugins to enable (by name)
  enabled:
    - "personal_messaging"
    - "bulletin_board"
    - "admin"
    - "hangman"
    - "zork"
  
  # Plugin-specific configuration
  personal_messaging:
    # Maximum message length
    max_message_length: 500
    # Maximum subject length
    max_subject_length: 50
  
  bulletin_board:
    # Default BBS area
    default_area: "general"
    # Available areas
    areas:
      - name: "general"
        description: "General discussion"
      - name: "for-sale"
        description: "Items for sale or trade"
      - name: "help"
        description: "Ask for help"
      - name: "announcements"
        description: "Official announcements"

# Admin Configuration
admin:
  # Password for admin commands (optional - nodes in allowed_nodes can skip)
  password: "secret123"
  
  # Nodes that can bypass password (use ADMIN <cmd> without password)
  allowed_nodes: []
    # - "!305ec26f"
    # - "!abcd1234"

# Channel (default channel) Response Settings
channel:
  # Respond to messages on default channel (if false, only respond to private messages)
  respond_to_channel: true
  
  # Commands allowed on default channel (public info commands)
  # Only used when respond_to_channel is true
  allowed_commands:
    - "BBS"
    - "HELP"
    - "AREAS"
    - "WHOAMI"
